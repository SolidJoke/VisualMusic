[build]
  command = "npm run build"
  publish = "dist"

# SPA: redirect all routes to index.html (required for React apps without server-side routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache audio samples for 1 year (they don't change)
[[headers]]
  for = "/samples/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache JS/CSS assets (hashed filenames, safe to cache forever)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
